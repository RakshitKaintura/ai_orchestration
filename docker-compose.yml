version: "3.9"

services:
  # ─── FastAPI Application Server ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mega_ai_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - chroma_data:/app/chroma_data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      uvicorn api.main:app
      --host ${API_HOST:-0.0.0.0}
      --port ${API_PORT:-8000}
      --reload
      --log-level ${LOG_LEVEL:-info}

  # ─── Celery Worker (background job processor) ─────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mega_ai_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
      - chroma_data:/app/chroma_data
      - ./logs:/app/logs
    command: >
      celery -A worker.app worker
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=2
      --queues=jobs,eval

  # ─── Log Query UI (Flask) ─────────────────────────────────────────────────
  log-ui:
    build:
      context: ./logs
      dockerfile: Dockerfile
    container_name: mega_ai_log_ui
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app

volumes:
  chroma_data:

networks:
  default:
    name: mega_ai_network
